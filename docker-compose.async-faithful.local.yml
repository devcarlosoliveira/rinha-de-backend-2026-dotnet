# TESTE LOCAL (não-submissão) — variante ASYNC "fiel" à config que pontuou ~4449:
#   - RUNTIME=async, ThreadPool com pool FIXO (MIN=MAX=8) p/ não estourar memória/CPU
#   - SEM MLOCK_INDEX (a config async original nunca teve mlock)
#   - SEM cpuset
# Mantém UDS tmpfs, índice por volume e limites cgroup 0.45/0.45/0.10.
#
# Subir: docker compose -f docker-compose.async-faithful.local.yml up -d

x-api: &api
  build:
    context: .
    dockerfile: Dockerfile.local
  image: rinha-2026-dotnet:local
  volumes:
    - sockets:/sockets
    - ./artifacts/index.bin:/app/index.bin:ro
  ulimits:
    memlock: -1
  networks:
    - app

services:
  api1:
    <<: *api
    environment:
      INDEX_PATH: /app/index.bin
      RUNTIME: async
      NLOW: "8"
      NHIGH: "128"
      MIN_THREADS: "8"
      MAX_THREADS: "8"
      SOCKET_PATH: /sockets/api1.sock
    cpus: 0.45
    mem_limit: 159m

  api2:
    <<: *api
    environment:
      INDEX_PATH: /app/index.bin
      RUNTIME: async
      NLOW: "8"
      NHIGH: "128"
      MIN_THREADS: "8"
      MAX_THREADS: "8"
      SOCKET_PATH: /sockets/api2.sock
    cpus: 0.45
    mem_limit: 159m

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    cpus: 0.10
    mem_limit: 32m
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=16m"
