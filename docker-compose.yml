# Submissão da Rinha de Backend 2026 — imagem pública linux/amd64.
# CPU via cpu_period/cpu_quota (período CFS curto = 10ms) p/ reduzir a cauda de p99
# por throttling, mantendo a média: 0.10 + 0.45 + 0.45 = 1.0 CPU.
# Memória (deploy.resources): 32 + 159 + 159 = 350 MB.
services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - app
    cpu_period: 10000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "32MB"
  api1:
    image: ${API_IMAGE:-devcarlosoliveira/rinha-2026-dotnet:latest}
    environment:
      INDEX_PATH: /app/index.bin
      NPROBE: "8"
      PORT: "9999"
    networks:
      - app
    cpu_period: 10000
    cpu_quota: 4500
    deploy:
      resources:
        limits:
          memory: "159MB"
  api2:
    image: ${API_IMAGE:-devcarlosoliveira/rinha-2026-dotnet:latest}
    environment:
      INDEX_PATH: /app/index.bin
      NPROBE: "8"
      PORT: "9999"
    networks:
      - app
    cpu_period: 10000
    cpu_quota: 4500
    deploy:
      resources:
        limits:
          memory: "159MB"
networks:
  app:
    driver: bridge
