# Submissão da Rinha de Backend 2026.
# A imagem da API precisa estar publicamente acessível (linux/amd64).
# Defina API_IMAGE com a sua imagem pública, ex.:
#   export API_IMAGE=seu-usuario/rinha-2026-dotnet:latest
# Soma dos limites: 0.10 + 0.45 + 0.45 = 1.0 CPU | 32 + 159 + 159 = 350 MB.

services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "32MB"

  api1:
    image: ${API_IMAGE:-devcarlosoliveira/rinha-2026-dotnet:latest}
    environment:
      INDEX_PATH: /app/index.bin
      NPROBE: "8"
      PORT: "9999"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159MB"

  api2:
    image: ${API_IMAGE:-devcarlosoliveira/rinha-2026-dotnet:latest}
    environment:
      INDEX_PATH: /app/index.bin
      NPROBE: "8"
      PORT: "9999"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159MB"

networks:
  app:
    driver: bridge
