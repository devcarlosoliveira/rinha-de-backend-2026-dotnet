# Load balancer L4 (TCP passthrough) + upstreams via Unix domain socket: o nginx só
# faz splice de bytes (round-robin nas conexões), e a ligação ao backend é por UDS num
# tmpfs partilhado — sem pilha TCP de loopback (sem handshake/checksum/TIME_WAIT),
# menos CPU dos dois lados ⇒ menos throttle do CFS ⇒ p99 menor.
# (Distribuição pura, sem inspecionar payload ⇒ dentro das regras.)
worker_processes 1;

events {
    worker_connections 4096;
}

stream {
    upstream api {
        server unix:/sockets/api1.sock max_fails=3 fail_timeout=2s;
        server unix:/sockets/api2.sock max_fails=3 fail_timeout=2s;
    }

    server {
        listen 9999;
        proxy_pass api;
        proxy_connect_timeout 1s;
    }
}
