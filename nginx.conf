worker_processes 1;

events {
    worker_connections 4096;
}

http {
    access_log off;
    error_log /dev/null crit;

    upstream api {
        server api1:9999 max_fails=3 fail_timeout=2s;
        server api2:9999 max_fails=3 fail_timeout=2s;
        keepalive 128;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            # Durante o warmup (carga do índice), reenvia para a outra instância
            # em vez de devolver 502 — 502 conta para o corte de 15% de falhas.
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }
    }
}
