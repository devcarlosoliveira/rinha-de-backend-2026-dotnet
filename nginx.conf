# Load balancer L4 (TCP passthrough) em vez de proxy HTTP L7: o nginx só faz splice
# de bytes entre cliente e backend (round-robin nas conexões), sem parsear/bufferizar
# HTTP. Quase zero CPU no LB e um salto mais leve — reduz a contenção que infla o p99.
# (Distribuição pura, sem inspecionar payload ⇒ dentro das regras.)
worker_processes 1;

events {
    worker_connections 4096;
}

stream {
    upstream api {
        server api1:9999 max_fails=3 fail_timeout=2s;
        server api2:9999 max_fails=3 fail_timeout=2s;
    }

    server {
        listen 9999;
        proxy_pass api;
        proxy_connect_timeout 1s;
    }
}
