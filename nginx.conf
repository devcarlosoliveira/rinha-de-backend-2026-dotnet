# Load balancer L4 (TCP passthrough) -> backends via Unix domain socket num tmpfs.
# Sem parse de HTTP, sem pilha TCP de loopback. Pinado a cores dedicados (cpuset).
# (Distribuição pura round-robin, sem inspecionar payload ⇒ dentro das regras.)
worker_processes 1;

events {
    worker_connections 4096;
}

stream {
    upstream api {
        server unix:/sockets/api1.sock max_fails=3 fail_timeout=2s;
        server unix:/sockets/api2.sock max_fails=3 fail_timeout=2s;
    }

    server {
        listen 9999;
        proxy_pass api;
        proxy_connect_timeout 1s;
    }
}
